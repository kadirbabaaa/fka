<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteri Karakter Önizleme</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 6px;
    color: #f8fafc;
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 28px;
  }
  .section {
    margin-bottom: 36px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #7dd3fc;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    padding-left: 4px;
    border-left: 3px solid #7dd3fc;
    padding-left: 10px;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }
  .card {
    background: #16213e;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 16px 12px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 110px;
  }
  .card-label {
    font-size: 11px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.4;
  }
  canvas.char {
    display: block;
  }
  .badge {
    font-size: 10px;
    background: #334155;
    border-radius: 6px;
    padding: 2px 8px;
    color: #cbd5e1;
  }
  .badge.angry { background: #7f1d1d; color: #fca5a5; }
  .badge.eating { background: #14532d; color: #86efac; }
  .badge.walking { background: #1e3a5f; color: #93c5fd; }
</style>
</head>
<body>

<h1>🍽️ Yeni Müşteri Karakter Tasarımı</h1>
<p class="subtitle">Chibi tarzı — Basit & Tatlı</p>

<div class="section">
  <div class="section-title">Vücut Tipleri</div>
  <div class="row" id="types-row"></div>
</div>

<div class="section">
  <div class="section-title">Durumlar</div>
  <div class="row" id="states-row"></div>
</div>

<div class="section">
  <div class="section-title">Renk Çeşitleri</div>
  <div class="row" id="colors-row"></div>
</div>

<div class="section">
  <div class="section-title">Yürüme Animasyonu</div>
  <div class="row" id="walk-row"></div>
</div>

<script>
// ─── CHIBI ÇİZİM SİSTEMİ ────────────────────────────────────────────────────

const HAIR_COLORS = ['#2d1b0e','#1a1a1a','#8b4513','#2c2c54','#1a4a1a','#7c2d12','#4a1d96','#064e3b'];
const BODY_COLORS = [
  '#6366f1','#ec4899','#f97316','#22c55e',
  '#0ea5e9','#a855f7','#ef4444','#84cc16',
  '#f59e0b','#14b8a6',
];

// Vücut tipi parametreleri
const BODY_TYPES = [
  { name: 'Normal',      bw: 26, bh: 22, hr: 19, legW: 9,  legH: 13 },
  { name: 'Tombul',      bw: 34, bh: 26, hr: 22, legW: 12, legH: 10 },
  { name: 'Uzun İnce',   bw: 20, bh: 18, hr: 16, legW: 7,  legH: 18 },
  { name: 'Kısa Tıknaz', bw: 30, bh: 24, hr: 20, legW: 11, legH: 8  },
];

// Saç stilleri
const HAIR_STYLES = [
  { name: 'Kısa Düz',    style: 'flat'   },
  { name: 'Kabarık',     style: 'fluffy' },
  { name: 'Uzun',        style: 'long'   },
  { name: 'Topuz',       style: 'bun'    },
  { name: 'Çıkık',       style: 'spiky'  },
];

function lerp(a, b, t) { return a + (b - a) * t; }

function drawChibiCustomer(ctx, cx, cy, opts = {}) {
  const {
    bodyType    = 0,
    bodyColor   = '#6366f1',
    hairColor   = '#2d1b0e',
    hairStyle   = 'flat',
    state       = 'idle',   // 'idle' | 'angry' | 'eating' | 'walking'
    walkPhase   = 0,
    scale       = 1,
    facingRight = true,
    seated      = false,
  } = opts;

  const t = BODY_TYPES[Math.min(bodyType, BODY_TYPES.length - 1)];
  const { bw, bh, hr, legW, legH } = t;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale * (facingRight ? 1 : -1), scale);

  const bobY   = state === 'walking' ? Math.abs(Math.sin(walkPhase)) * 4 : 0;
  const tilt   = state === 'walking' ? Math.sin(walkPhase) * 0.06 : 0;
  const legSw  = state === 'walking' ? Math.sin(walkPhase) * 7 : 0;
  const armSw  = state === 'walking' ? Math.sin(walkPhase + Math.PI) * 5 : 0;

  // Zemin gölgesi
  const shSc = 1 - bobY / 40;
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.beginPath();
  ctx.ellipse(0, 14 * scale, 20 * shSc, 6 * shSc, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.translate(0, -bobY);
  ctx.rotate(tilt);

  // ── BACAKLAR ────────────────────────────────────────────────────────────────
  if (!seated) {
    // Sol bacak
    ctx.beginPath();
    ctx.roundRect(-legW - 2 + legSw, bh / 2 - 4, legW, legH, [0, 0, legW / 2, legW / 2]);
    ctx.fillStyle = darken(bodyColor, 30);
    ctx.fill();
    // Sol ayak (küçük yuvarlak)
    ctx.beginPath();
    ctx.ellipse(-legW / 2 - 2 + legSw, bh / 2 - 4 + legH + 3, legW / 2 + 2, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = darken(bodyColor, 50);
    ctx.fill();

    // Sağ bacak
    ctx.beginPath();
    ctx.roundRect(2 - legSw, bh / 2 - 4, legW, legH, [0, 0, legW / 2, legW / 2]);
    ctx.fillStyle = darken(bodyColor, 22);
    ctx.fill();
    // Sağ ayak
    ctx.beginPath();
    ctx.ellipse(legW / 2 + 2 - legSw, bh / 2 - 4 + legH + 3, legW / 2 + 2, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = darken(bodyColor, 45);
    ctx.fill();
  } else {
    // Oturmuş — yatay bacaklar
    ctx.beginPath();
    ctx.roundRect(-bw / 2, bh / 2 - 6, bw, 8, 4);
    ctx.fillStyle = darken(bodyColor, 28);
    ctx.fill();
  }

  // ── GÖVDE (yuvarlak blob) ────────────────────────────────────────────────
  ctx.beginPath();
  ctx.ellipse(0, 0, bw / 2 + 2, bh / 2 + 2, 0, 0, Math.PI * 2);
  const bodyG = ctx.createRadialGradient(-bw * 0.15, -bh * 0.2, 1, 0, 0, bw / 2 + 2);
  bodyG.addColorStop(0, lighten(bodyColor, 30));
  bodyG.addColorStop(1, bodyColor);
  ctx.fillStyle = bodyG;
  ctx.fill();

  // Gövde parlama
  ctx.beginPath();
  ctx.ellipse(-bw * 0.1, -bh * 0.22, bw * 0.26, bh * 0.18, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fill();

  // ── KOLLAR (küçük yuvarlak) ──────────────────────────────────────────────
  // Sol kol
  ctx.beginPath();
  ctx.ellipse(-bw / 2 - 5, armSw, 6, 9, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = darken(bodyColor, 15);
  ctx.fill();
  // Sağ kol
  ctx.beginPath();
  ctx.ellipse(bw / 2 + 5, -armSw, 6, 9, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = bodyColor;
  ctx.fill();

  // ── BAŞ ─────────────────────────────────────────────────────────────────
  const headCy = -bh / 2 - hr + 2;

  // Kafa (büyük yuvarlak)
  ctx.beginPath();
  ctx.arc(0, headCy, hr, 0, Math.PI * 2);
  const headG = ctx.createRadialGradient(-hr * 0.25, headCy - hr * 0.25, 1, 0, headCy, hr);
  headG.addColorStop(0, '#fef3e2');
  headG.addColorStop(1, '#f5c18a');
  ctx.fillStyle = headG;
  ctx.fill();

  // Kulaklar
  ctx.beginPath();
  ctx.ellipse(-hr - 2, headCy + 3, 5, 7, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f0aa70';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(hr + 2, headCy + 3, 5, 7, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f0aa70';
  ctx.fill();

  // ── SAÇ ─────────────────────────────────────────────────────────────────
  drawHair(ctx, 0, headCy, hr, hairColor, hairStyle);

  // ── YANAK ───────────────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255, 120, 100, 0.28)';
  ctx.beginPath();
  ctx.ellipse(-hr * 0.55, headCy + hr * 0.2, hr * 0.3, hr * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(hr * 0.55, headCy + hr * 0.2, hr * 0.3, hr * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── GÖZLER & AĞIZ ───────────────────────────────────────────────────────
  drawFace(ctx, 0, headCy, hr, state);

  ctx.restore();
}

function drawHair(ctx, cx, cy, hr, color, style) {
  ctx.fillStyle = color;
  switch (style) {
    case 'flat': {
      // Düz kısa saç — kafanın üst yarısı
      ctx.beginPath();
      ctx.arc(cx, cy, hr, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // Ön alın saç
      ctx.beginPath();
      ctx.arc(cx, cy - hr + 5, hr * 0.55, Math.PI, 0);
      ctx.fill();
      break;
    }
    case 'fluffy': {
      // Kabarık — birkaç yuvarlak top
      ctx.beginPath();
      ctx.arc(cx, cy - hr + 2, hr * 0.72, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - hr * 0.45, cy - hr * 0.5, hr * 0.48, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + hr * 0.45, cy - hr * 0.5, hr * 0.48, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy - hr - 4, hr * 0.55, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'long': {
      // Uzun saç — yanlara sarkar
      ctx.beginPath();
      ctx.arc(cx, cy, hr, Math.PI, 0);
      ctx.fill();
      // Sağ taraf uzun
      ctx.beginPath();
      ctx.roundRect(cx + hr * 0.3, cy - 4, hr * 0.55, hr * 1.6, [0, 0, 8, 8]);
      ctx.fill();
      // Sol taraf uzun
      ctx.beginPath();
      ctx.roundRect(cx - hr * 0.85, cy - 4, hr * 0.55, hr * 1.6, [0, 0, 8, 8]);
      ctx.fill();
      break;
    }
    case 'bun': {
      // Topuz
      ctx.beginPath();
      ctx.arc(cx, cy, hr, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + hr * 0.4, cy - hr - 5, hr * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - hr * 0.4, cy - hr - 5, hr * 0.45, 0, Math.PI * 2);
      ctx.fill();
      // İnce topuz çubuğu
      ctx.strokeStyle = darken(color, 20);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - hr * 0.5, cy - hr + 2);
      ctx.lineTo(cx - hr * 0.4, cy - hr - 3);
      ctx.moveTo(cx + hr * 0.5, cy - hr + 2);
      ctx.lineTo(cx + hr * 0.4, cy - hr - 3);
      ctx.stroke();
      break;
    }
    case 'spiky': {
      // Diken saç
      ctx.beginPath();
      ctx.arc(cx, cy, hr, Math.PI, 0);
      ctx.fill();
      // Dikenler
      for (let i = 0; i < 5; i++) {
        const angle = Math.PI + (i / 4) * Math.PI;
        const tipX = cx + Math.cos(angle) * (hr + 9);
        const tipY = cy + Math.sin(angle) * (hr + 9);
        const lx = cx + Math.cos(angle - 0.25) * hr;
        const ly = cy + Math.sin(angle - 0.25) * hr;
        const rx = cx + Math.cos(angle + 0.25) * hr;
        const ry = cy + Math.sin(angle + 0.25) * hr;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(tipX, tipY);
        ctx.lineTo(rx, ry);
        ctx.fill();
      }
      break;
    }
  }
}

function drawFace(ctx, cx, cy, hr, state) {
  const eyeY = cy - hr * 0.08;
  const mouthY = cy + hr * 0.38;

  if (state === 'angry') {
    // Kızgın gözler (V kaş)
    ctx.fillStyle = '#1a0a0a';
    ctx.beginPath();
    ctx.ellipse(cx - hr * 0.35, eyeY, hr * 0.18, hr * 0.22, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + hr * 0.35, eyeY, hr * 0.18, hr * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // Kaşlar
    ctx.strokeStyle = '#1a0a0a';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - hr * 0.55, eyeY - hr * 0.32);
    ctx.lineTo(cx - hr * 0.16, eyeY - hr * 0.18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + hr * 0.55, eyeY - hr * 0.32);
    ctx.lineTo(cx + hr * 0.16, eyeY - hr * 0.18);
    ctx.stroke();
    // Ters ağız
    ctx.strokeStyle = '#7a3020';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.arc(cx, mouthY + 4, hr * 0.28, Math.PI + 0.3, -0.3);
    ctx.stroke();
    return;
  }

  if (state === 'eating') {
    // Mutlu kapalı gözler (yay)
    ctx.strokeStyle = '#1a0a0a';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cx - hr * 0.35, eyeY, hr * 0.2, Math.PI + 0.3, -0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx + hr * 0.35, eyeY, hr * 0.2, Math.PI + 0.3, -0.3);
    ctx.stroke();
    // Açık mutlu ağız
    ctx.fillStyle = '#8B0000';
    ctx.beginPath();
    ctx.ellipse(cx, mouthY + 3, hr * 0.26, hr * 0.18, 0, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = '#7a3020';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, mouthY - 2, hr * 0.3, 0.1, Math.PI - 0.1);
    ctx.stroke();
    return;
  }

  // Normal / yürüyen
  ctx.fillStyle = '#1a0a0a';
  // Sol göz
  ctx.beginPath();
  ctx.ellipse(cx - hr * 0.35, eyeY, hr * 0.17, hr * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Sağ göz
  ctx.beginPath();
  ctx.ellipse(cx + hr * 0.35, eyeY, hr * 0.17, hr * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Göz parıltıları
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(cx - hr * 0.28, eyeY - hr * 0.1, hr * 0.07, hr * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + hr * 0.42, eyeY - hr * 0.1, hr * 0.07, hr * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();
  // Gülümseme
  ctx.strokeStyle = '#7a3020';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, mouthY, hr * 0.28, 0.2, Math.PI - 0.2);
  ctx.stroke();
}

// Renk yardımcıları
function lighten(hex, amount) {
  return adjustColor(hex, amount);
}
function darken(hex, amount) {
  return adjustColor(hex, -amount);
}
function adjustColor(hex, amount) {
  const r = Math.min(255, Math.max(0, parseInt(hex.slice(1, 3), 16) + amount));
  const g = Math.min(255, Math.max(0, parseInt(hex.slice(3, 5), 16) + amount));
  const b = Math.min(255, Math.max(0, parseInt(hex.slice(5, 7), 16) + amount));
  return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
}

// ─── CANVAS KARTLARI OLUŞTUR ─────────────────────────────────────────────────

function makeCard(label, badge, badgeClass, drawFn, animated = false) {
  const card = document.createElement('div');
  card.className = 'card';

  const canvas = document.createElement('canvas');
  canvas.className = 'char';
  canvas.width = 110;
  canvas.height = 120;

  const labelEl = document.createElement('div');
  labelEl.className = 'card-label';
  labelEl.textContent = label;

  const badgeEl = document.createElement('div');
  badgeEl.className = 'badge ' + (badgeClass || '');
  badgeEl.textContent = badge;

  card.appendChild(canvas);
  card.appendChild(labelEl);
  card.appendChild(badgeEl);

  if (animated) {
    let phase = Math.random() * Math.PI * 2;
    function frame() {
      phase += 0.06;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFn(ctx, canvas.width / 2, canvas.height - 20, phase);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  } else {
    const ctx = canvas.getContext('2d');
    drawFn(ctx, canvas.width / 2, canvas.height - 20);
  }

  return card;
}

// ─── BÖLÜM 1: Vücut Tipleri ─────────────────────────────────────────────────
const typesRow = document.getElementById('types-row');
const typeLabels = ['Normal', 'Tombul', 'Uzun İnce', 'Kısa Tıknaz'];
BODY_TYPES.forEach((type, i) => {
  const card = makeCard(typeLabels[i], `Tip ${i+1}`, '', (ctx, cx, cy) => {
    drawChibiCustomer(ctx, cx, cy, {
      bodyType: i,
      bodyColor: BODY_COLORS[i],
      hairColor: HAIR_COLORS[i % HAIR_COLORS.length],
      hairStyle: HAIR_STYLES[i % HAIR_STYLES.length].style,
      state: 'idle',
    });
  });
  typesRow.appendChild(card);
});

// ─── BÖLÜM 2: Durumlar ──────────────────────────────────────────────────────
const statesRow = document.getElementById('states-row');

const stateConfigs = [
  { label: 'Bekleme', badge: 'Idle', cls: '',       state: 'idle',    animated: false },
  { label: 'Yüksek Sabır', badge: 'Mutlu', cls: '',  state: 'idle',    animated: false, extraPatience: 1   },
  { label: 'Düşük Sabır', badge: 'Sinirli', cls: 'angry', state: 'angry',   animated: false },
  { label: 'Yemek Yiyor', badge: 'Yiyor', cls: 'eating', state: 'eating',  animated: false },
  { label: 'Yürüyor',    badge: 'Yürüyor', cls: 'walking', state: 'walking', animated: true  },
];

stateConfigs.forEach((cfg, i) => {
  const card = makeCard(cfg.label, cfg.badge, cfg.cls, (ctx, cx, cy, phase) => {
    drawChibiCustomer(ctx, cx, cy, {
      bodyType: 0,
      bodyColor: '#6366f1',
      hairColor: HAIR_COLORS[0],
      hairStyle: 'flat',
      state: cfg.state,
      walkPhase: phase || 0,
    });
  }, cfg.animated);
  statesRow.appendChild(card);
});

// Oturmuş
{
  const card = makeCard('Oturuyor', 'Seated', '', (ctx, cx, cy) => {
    drawChibiCustomer(ctx, cx, cy, {
      bodyType: 0,
      bodyColor: '#6366f1',
      hairColor: HAIR_COLORS[0],
      hairStyle: 'flat',
      state: 'eating',
      seated: true,
    });
  });
  statesRow.appendChild(card);
}

// ─── BÖLÜM 3: Renk & Saç Çeşitleri ─────────────────────────────────────────
const colorsRow = document.getElementById('colors-row');
BODY_COLORS.slice(0, 8).forEach((color, i) => {
  const hairStyle = HAIR_STYLES[i % HAIR_STYLES.length];
  const card = makeCard(hairStyle.name, color, '', (ctx, cx, cy) => {
    drawChibiCustomer(ctx, cx, cy, {
      bodyType: i % 4,
      bodyColor: color,
      hairColor: HAIR_COLORS[i % HAIR_COLORS.length],
      hairStyle: hairStyle.style,
      state: 'idle',
    });
  });
  colorsRow.appendChild(card);
});

// ─── BÖLÜM 4: Yürüme Animasyonu ─────────────────────────────────────────────
const walkRow = document.getElementById('walk-row');
BODY_TYPES.forEach((type, i) => {
  const card = makeCard(typeLabels[i] + '\nYürüyor', 'Animasyonlu', 'walking', (ctx, cx, cy, phase) => {
    drawChibiCustomer(ctx, cx, cy, {
      bodyType: i,
      bodyColor: BODY_COLORS[i + 4],
      hairColor: HAIR_COLORS[(i + 3) % HAIR_COLORS.length],
      hairStyle: HAIR_STYLES[(i + 2) % HAIR_STYLES.length].style,
      state: 'walking',
      walkPhase: phase,
      facingRight: true,
    });
  }, true);
  walkRow.appendChild(card);
});
</script>
</body>
</html>
